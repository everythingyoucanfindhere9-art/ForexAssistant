name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build APK
        run: |
          # 1. This finds the folder that has the actual app code
          APP_DIR=$(find . -name "build.gradle" -not -path "*/.*" | head -n 1 | xargs dirname)
          echo "Found code in: $APP_DIR"
          cd $APP_DIR
          
          # 2. Check for gradlew, if missing, create it
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi
          
          # 3. Build the app
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ForexAssistant-APK
          path: "**/build/outputs/apk/debug/app-debug.apk"
