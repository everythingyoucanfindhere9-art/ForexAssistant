name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Ultimate Build
        run: |
          # 1. Force unzip any archive found in the repo
          find . -name "*.zip" -exec unzip -o {} \;
          
          # 2. Find the folder that has 'build.gradle' (the actual app)
          # We skip any 'build.gradle' found in the root and look for the 'app' one
          PROJ_DIR=$(find . -name "settings.gradle" -exec dirname {} \+ | head -n 1)
          echo "Building from: $PROJ_DIR"
          cd "$PROJ_DIR"
          
          # 3. Create a fresh builder (gradlew) on the fly
          gradle wrapper
          chmod +x gradlew
          
          # 4. Build the Debug APK
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ForexAssistant-APK
          path: "**/build/outputs/apk/debug/app-debug.apk"
