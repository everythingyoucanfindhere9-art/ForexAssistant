name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip and Build
        run: |
          # 1. Force unzip everything in case it's still zipped
          find . -name "*.zip" -exec unzip -o {} \;
          
          # 2. Find where the Android project actually is
          PROJ_DIR=$(find . -name "settings.gradle" -exec dirname {} \+ | head -n 1)
          echo "Project found in: $PROJ_DIR"
          cd $PROJ_DIR
          
          # 3. Create the builder and run it
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ForexAssistant-APK
          path: "**/build/outputs/apk/debug/app-debug.apk"
