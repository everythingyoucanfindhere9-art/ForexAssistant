      - name: Build Debug APK
        run: |
          cd ForexAssistant/ForexAssistant
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ForexAssistant-APK
          path: ForexAssistant/ForexAssistant/app/build/outputs/apk/debug/app-debug.apk
