name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build APK
        run: |
          # Go to the folder where gradlew is hiding
          cd ForexAssistant/ForexAssistant
          
          # Give it permission to run
          chmod +x gradlew
          
          # Run the build using the local wrapper
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ForexAssistant-APK
          path: ForexAssistant/ForexAssistant/app/build/outputs/apk/debug/app-debug.apk
