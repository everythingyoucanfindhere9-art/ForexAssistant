name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Build
        run: |
          # 1. Find the REAL root folder of your Android app
          PROJ_DIR=$(find . -name "settings.gradle" -exec dirname {} \+ | head -n 1)
          
          if [ -z "$PROJ_DIR" ]; then
            echo "STILL NOT FOUND - checking for zip files..."
            find . -name "*.zip" -exec unzip -o {} \;
            PROJ_DIR=$(find . -name "settings.gradle" -exec dirname {} \+ | head -n 1)
          fi
          
          echo "Project located in: $PROJ_DIR"
          cd "$PROJ_DIR"
          
          # 2. Build the "engine" from scratch
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ForexAssistant-APK
          path: "**/build/outputs/apk/debug/app-debug.apk"
