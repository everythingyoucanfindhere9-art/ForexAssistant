name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build APK
        run: |
          # 1. Find the folder that actually contains 'settings.gradle'
          PROJ_DIR=$(find . -name "settings.gradle" -exec dirname {} \+)
          cd $PROJ_DIR
          
          # 2. Force create a fresh wrapper so we don't need your 'gradlew' file
          gradle wrapper
          chmod +x gradlew
          
          # 3. Build the app
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ForexAssistant-APK
          path: "**/build/outputs/apk/debug/app-debug.apk"
