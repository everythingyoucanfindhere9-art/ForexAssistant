name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build with Gradle
        run: |
          # This automatically finds your project folder and starts the build
          GRADLEW_PATH=$(find . -name gradlew | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then echo "Gradlew not found"; exit 1; fi
          chmod +x "$GRADLEW_PATH"
          cd $(dirname "$GRADLEW_PATH")
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ForexAssistant-APK
          path: "**/build/outputs/apk/debug/app-debug.apk"
